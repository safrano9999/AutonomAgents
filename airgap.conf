# airgap.conf - Configuration for airgapped.sh
# Only major releases. Script skips save if version+arch already in output/

# openclaw
OPENCLAW_REPO="https://github.com/openclaw/openclaw"
OPENCLAW_IMAGE_TAG_PATTERN="${VERSION}-slim-${ARCH_SUFFIX}"
OPENCLAW_BUILD_ARGS="--build-arg OPENCLAW_DOCKER_APT_PACKAGES= --build-arg OPENCLAW_EXTENSIONS= --build-arg OPENCLAW_INSTALL_DOCKER_CLI="

# hermes
HERMES_REPO="https://github.com/NousResearch/hermes-agent"
HERMES_IMAGE="hermes-agent:latest"

# engine per side
SAVE_ENGINE="podman"
LOAD_ENGINE="docker"

# already exported versions (auto-maintained by script)
# format: version:arch
EXPORTED_VERSIONS=()
